<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파주사업소 스마트 보고서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; -webkit-tap-highlight-color: transparent; user-select: none; color: #f1f5f9; font-family: 'Pretendard', sans-serif; }
        input, textarea, select { user-select: text !important; }
        ::-webkit-scrollbar { display: none; }
        .tab-active { background: #334155; color: #60a5fa; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); font-weight: 800; border: 1px solid #475569; }
        .tab-inactive { color: #94a3b8; font-weight: 600; background: transparent; }
        textarea { resize: none; line-height: 1.6; letter-spacing: -0.01em; overflow-y: hidden; }
        select { text-align-last: center; text-align: center; }
    </style>
</head>
<body class="pb-24 antialiased">
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-3 w-full max-w-[320px] px-4 pointer-events-none"></div>
    <div class="max-w-md mx-auto px-4 pt-6 space-y-5 relative">
        <header class="bg-slate-800 rounded-3xl p-5 border border-slate-700 shadow-xl flex flex-col gap-4">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-xl font-extrabold text-white">스마트 보고서</h1>
                    <div class="inline-flex items-center gap-1.5 px-2 py-0.5 bg-slate-900 border border-slate-700 rounded-full mt-1">
                        <i class="fa-solid fa-crown text-[9px] text-yellow-400"></i>
                        <span class="text-[9px] font-bold text-yellow-400">천재 탱PL 제작</span>
                    </div>
                </div>
                <button onclick="fetchWeather()" class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-2 px-3 py-2 bg-slate-900 border border-slate-700 rounded-2xl">
                        <div id="weather-icon" class="text-lg">🌤️</div>
                        <div class="flex flex-col items-start">
                            <span id="quick-weather-temp" class="text-[11px] font-extrabold text-white">--°C</span>
                            <span id="quick-weather-desc" class="text-[9px] font-semibold text-slate-400">동기화 중</span>
                        </div>
                    </div>
                </button>
            </div>
        </header>

        <nav class="sticky top-2 z-40 flex p-1.5 bg-slate-800/80 backdrop-blur-md rounded-2xl border border-slate-700">
            <button onclick="switchTab('morning')" id="tab-morning" class="tab-btn flex-1 py-3 rounded-xl text-xs tab-active">아침 현황</button>
            <button onclick="switchTab('dispatch')" id="tab-dispatch" class="tab-btn flex-1 py-3 rounded-xl text-xs tab-inactive">급전 지시</button>
            <button onclick="switchTab('grid')" id="tab-grid" class="tab-btn flex-1 py-3 rounded-xl text-xs tab-inactive">계통 조작</button>
        </nav>

        <div id="panel-morning" class="space-y-4">
            <div class="bg-slate-800 rounded-3xl p-5 border border-slate-700 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="m-date" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-xs">
                    <div class="flex gap-1">
                        <input type="number" id="m-temp" class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl text-white text-xs text-center">
                        <select id="m-weather" class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl text-white text-xs"><option>맑음</option><option selected>흐림</option></select>
                    </div>
                </div>
            </div>
            <textarea id="memo-morning" oninput="autoResize(this)" class="w-full bg-[#0f172a] text-emerald-400 p-5 font-mono text-[13px] outline-none rounded-3xl"></textarea>
            <button onclick="renderMorningMemo()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm">적용하기</button>
        </div>
    </div>

    <script>
        // 핵심 수정: getCCBlock 로직 교정
        function getCCBlock(cc) {
            const st = (cc===1 ? state1 : state2);
            const prefix = (cc===1 ? '#1CC' : '#2CC');
            const gtNm = (cc===1 ? "11GT/12GT/10ST " : "21GT/22GT/20ST ");
            
            // 2CC일 경우 21GT/22GT/20ST를 참조하도록 변수 매핑 수정
            const g1 = parseInt(document.getElementById(cc===1?'i-gt11':'i-gt21').value)||0;
            const g2 = parseInt(document.getElementById(cc===1?'i-gt12':'i-gt22').value)||0;
            const s = parseInt(document.getElementById(cc===1?'i-st10':'i-st20').value)||0;
            const tot = g1+g2+s;

            // 줄간격 띄어쓰기 100% 동일화 (padStart 이용)
            const padFunc = (g1, g2, s) => `        ${g1.toString().padStart(3,' ')}/ ${g2.toString().padStart(3,' ')}/ ${s.toString().padStart(3,' ')}MW    `;

            if(st==='정지') return `    - ${prefix} 급전지시 정지 상태\n     (Total Load : 0MW)        \n     ${gtNm}\n             0/   0/  0MW`;
            if(st==='운전') return `    - ${prefix} 2+1 운전 중\n     (Total Load : ${tot}MW)        \n     ${gtNm}\n${padFunc(g1,g2,s)}`;
            if(st==='운전11') return `    - ${prefix} 1+1 운전 중\n     (Total Load : ${tot}MW)        \n     ${gtNm}\n${padFunc(g1,g2,s)}`;
            if(st==='기동') return `    - ${prefix} 기동 중\n     (Total Load : ${tot}MW)        \n     ${gtNm}\n${padFunc(g1,g2,s)}`;
            return "";
        }

        // ... 나머지 함수 동일 유지 ...
    </script>
</body>
</html>
