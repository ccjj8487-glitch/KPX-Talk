<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파주사업소 스마트 보고서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: {
                        darkbg: '#0f172a', /* 진한 네이비 배경 */
                        cardbg: '#1e293b', /* 카드 배경 */
                        cardborder: '#334155', /* 카드 테두리 */
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            color: #f1f5f9;
        }
        input, textarea, select { user-select: text !important; }
        ::-webkit-scrollbar { display: none; }
        
        /* 탭 애니메이션 */
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-active { background: #334155; color: #60a5fa; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); font-weight: 800; border: 1px solid #475569; }
        .tab-inactive { color: #94a3b8; font-weight: 600; background: transparent; }

        /* 터미널 스타일 텍스트에디터 */
        textarea { resize: none; line-height: 1.6; letter-spacing: -0.01em; overflow-y: hidden; }
        
        select { text-align-last: center; text-align: center; }

        /* 슬라이더 커스텀 */
        input[type=range] {
            -webkit-appearance: none; background: transparent; width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
            background: #ffffff; border: 2px solid #3b82f6; cursor: pointer;
            margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; background: #334155; border-radius: 3px;
        }
        
        /* 펄스 애니메이션 */
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-soft-pulse { animation: soft-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="pb-24 antialiased">

    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-3 w-full max-w-[320px] px-4 pointer-events-none"></div>

    <div class="max-w-md mx-auto px-4 pt-6 space-y-5 relative">

        <header class="bg-cardbg rounded-3xl p-5 relative overflow-hidden flex flex-col gap-4 border border-cardborder shadow-xl">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>
            
            <div class="relative z-10 flex justify-between items-start">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-soft-pulse shadow-[0_0_8px_rgba(59,130,246,0.8)]"></div>
                        <h1 class="text-xl font-extrabold text-white tracking-tight">스마트 보고서</h1>
                    </div>
                    <div class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-gradient-to-r from-gray-900 to-gray-800 border border-gray-700 rounded-full mt-1">
                        <i class="fa-solid fa-crown text-[10px] text-yellow-400"></i>
                        <span class="text-[10px] font-bold text-yellow-400 tracking-wide">천재 탱PL 제작</span>
                    </div>
                </div>
                <button onclick="fetchWeather()" class="group flex flex-col items-end gap-1 active:scale-95 transition-transform text-right">
                    <div class="flex items-center gap-2 px-3 py-2 bg-slate-800 border border-slate-700 rounded-2xl shadow-sm">
                        <div id="weather-icon" class="text-lg">🌤️</div>
                        <div class="flex flex-col items-start">
                            <span id="quick-weather-temp" class="text-sm font-extrabold text-white leading-none">--°C</span>
                            <span id="quick-weather-desc" class="text-[10px] font-semibold text-slate-400 leading-none mt-1">동기화 중</span>
                        </div>
                        <i id="weather-spinner" class="fa-solid fa-rotate-right text-[10px] text-slate-500 ml-1"></i>
                    </div>
                </button>
            </div>
        </header>

        <nav class="sticky top-2 z-40 flex p-1.5 bg-slate-900/80 backdrop-blur-md rounded-2xl shadow-lg border border-slate-700">
            <button onclick="switchTab('morning')" id="tab-morning" class="tab-btn flex-1 py-2.5 rounded-xl text-[11px] flex items-center justify-center gap-1.5 tab-active">
                <i class="fa-solid fa-sun"></i> 아침 현황
            </button>
            <button onclick="switchTab('dispatch')" id="tab-dispatch" class="tab-btn flex-1 py-2.5 rounded-xl text-[11px] flex items-center justify-center gap-1.5 tab-inactive">
                <i class="fa-solid fa-bolt"></i> 급전 지시
            </button>
            <button onclick="switchTab('grid')" id="tab-grid" class="tab-btn flex-1 py-2.5 rounded-xl text-[11px] flex items-center justify-center gap-1.5 tab-inactive">
                <i class="fa-solid fa-network-wired"></i> 계통 조작
            </button>
        </nav>

        <div id="panel-morning" class="space-y-5 animate-fade-in">
            
            <div class="bg-cardbg rounded-3xl p-5 border border-cardborder shadow-md space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <div class="p-1.5 bg-blue-500/20 rounded-lg text-blue-400"><i class="fa-regular fa-calendar-check text-sm"></i></div>
                    <h3 class="text-sm font-bold text-white">기본 정보 설정</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5">
                        <label class="block text-[11px] font-bold text-slate-400 pl-1">보고 날짜</label>
                        <input type="date" id="m-date" onchange="triggerUpdate()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white text-[13px] font-bold outline-none focus:border-blue-500">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-[11px] font-bold text-slate-400 pl-1">온도 및 날씨</label>
                        <div class="flex gap-1.5">
                            <input type="number" id="m-temp" step="0.1" oninput="triggerUpdate()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-1 py-2.5 text-white text-[13px] font-bold text-center outline-none focus:border-blue-500">
                            <select id="m-weather" onchange="triggerUpdate()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-1 py-2.5 text-white text-[13px] font-bold outline-none focus:border-blue-500 appearance-none text-center cursor-pointer">
                                <option value="맑음">맑음</option><option value="흐림">흐림</option>
                                <option value="비">비</option><option value="눈">눈</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-cardbg rounded-3xl p-5 border border-cardborder border-l-4 border-l-blue-500 shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-industry text-blue-400"></i> #1CC 운전 제어
                    </h3>
                    <span id="badge-1cc" class="bg-blue-500/20 text-blue-300 text-[10px] font-bold px-2.5 py-1 rounded-full border border-blue-500/30">2+1 운전중</span>
                </div>
                
                <div class="grid grid-cols-5 gap-1.5 mb-4">
                    <button onclick="setCCState(1, '정지')" id="btn-1cc-정지" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">정지</button>
                    <button onclick="setCCState(1, '운전')" id="btn-1cc-운전" class="py-2.5 rounded-xl border border-blue-500 bg-blue-600/20 text-[11px] font-bold text-blue-400">2+1</button>
                    <button onclick="setCCState(1, '운전11')" id="btn-1cc-운전11" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">1+1</button>
                    <button onclick="setCCState(1, '기동')" id="btn-1cc-기동" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">기동</button>
                    <button onclick="setCCState(1, '계획정비')" id="btn-1cc-계획정비" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">정비</button>
                </div>

                <div id="m-box-1" class="hidden bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 pl-1">정비 기간 입력</label>
                    <input type="text" id="period-1" value="5/14 00:00 ~ 5/27 24:00" oninput="triggerUpdate()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none">
                </div>

                <div class="space-y-4 pt-1">
                    <div class="flex items-center gap-3">
                        <span class="w-10 text-[11px] font-bold text-slate-400">11GT</span>
                        <input type="range" id="s-gt11" min="0" max="350" value="285" class="flex-1" oninput="syncFromSlider('gt11')">
                        <input type="number" id="i-gt11" value="285" class="w-14 bg-slate-900 border border-slate-700 rounded-lg py-1.5 text-center text-[13px] font-bold text-white focus:border-blue-500" oninput="syncFromInput('gt11')">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-10 text-[11px] font-bold text-slate-400">12GT</span>
                        <input type="range" id="s-gt12" min="0" max="350" value="285" class="flex-1" oninput="syncFromSlider('gt12')">
                        <input type="number" id="i-gt12" value="285" class="w-14 bg-slate-900 border border-slate-700 rounded-lg py-1.5 text-center text-[13px] font-bold text-white focus:border-blue-500" oninput="syncFromInput('gt12')">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-10 text-[11px] font-bold text-slate-400">10ST</span>
                        <input type="range" id="s-st10" min="0" max="350" value="299" class="flex-1" oninput="syncFromSlider('st10')">
                        <input type="number" id="i-st10" value="299" class="w-14 bg-slate-900 border border-slate-700 rounded-lg py-1.5 text-center text-[13px] font-bold text-white focus:border-blue-500" oninput="syncFromInput('st10')">
                    </div>
                </div>
            </div>

            <div class="bg-cardbg rounded-3xl p-5 border border-cardborder border-l-4 border-l-teal-500 shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-industry text-teal-400"></i> #2CC 출력 설정
                    </h3>
                    <span id="badge-2cc" class="bg-teal-500/20 text-teal-300 text-[10px] font-bold px-2.5 py-1 rounded-full border border-teal-500/30">2+1 운전중</span>
                </div>
                
                <div class="grid grid-cols-5 gap-1.5 mb-4">
                    <button onclick="setCCState(2, '정지')" id="btn-2cc-정지" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">정지</button>
                    <button onclick="setCCState(2, '운전')" id="btn-2cc-운전" class="py-2.5 rounded-xl border border-teal-500 bg-teal-600/20 text-[11px] font-bold text-teal-400">2+1</button>
                    <button onclick="setCCState(2, '운전21')" id="btn-2cc-운전21" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">1+1</button>
                    <button onclick="setCCState(2, '기동')" id="btn-2cc-기동" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">기동</button>
                    <button onclick="setCCState(2, '계획정비')" id="btn-2cc-계획정비" class="py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400">정비</button>
                </div>

                <div id="m-box-2" class="hidden bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4">
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 pl-1">정비 기간 입력</label>
                    <input type="text" id="period-2" value="5/16 00:00 ~ 5/17 19:00" oninput="triggerUpdate()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none">
                </div>

                <div class="space-y-4 pt-1">
                    <div class="flex items-center gap-3">
                        <span class="w-10 text-[11px] font-bold text-slate-400">21GT</span>
                        <input type="range" id="s-gt21" min="0" max="350" value="289" class="flex-1" oninput="syncFromSlider('gt21')">
                        <input type="number" id="i-gt21" value="289" class="w-14 bg-slate-900 border border-slate-700 rounded-lg py-1.5 text-center text-[13px] font-bold text-white focus:border-teal-500" oninput="syncFromInput('gt21')">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-10 text-[11px] font-bold text-slate-400">22GT</span>
                        <input type="range" id="s-gt22" min="0" max="350" value="289" class="flex-1" oninput="syncFromSlider('gt22')">
                        <input type="number" id="i-gt22" value="289" class="w-14 bg-slate-900 border border-slate-700 rounded-lg py-1.5 text-center text-[13px] font-bold text-white focus:border-teal-500" oninput="syncFromInput('gt22')">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-10 text-[11px] font-bold text-slate-400">20ST</span>
                        <input type="range" id="s-st20" min="0" max="350" value="297" class="flex-1" oninput="syncFromSlider('st20')">
                        <input type="number" id="i-st20" value="297" class="w-14 bg-slate-900 border border-slate-700 rounded-lg py-1.5 text-center text-[13px] font-bold text-white focus:border-teal-500" oninput="syncFromInput('st20')">
                    </div>
                </div>
            </div>

            <div class="bg-cardbg rounded-3xl p-5 shadow-md border border-cardborder">
                <label class="block text-slate-300 text-xs font-bold mb-2">특이사항 추가</label>
                <input type="text" id="m-issue" value="없음" oninput="triggerUpdate()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-xs font-semibold focus:border-blue-500 outline-none">
            </div>

            <div class="bg-[#0b1120] rounded-3xl shadow-xl border border-slate-700 overflow-hidden relative mt-8">
                <div class="flex justify-between items-center px-4 py-3 bg-[#1e293b] border-b border-slate-700 sticky top-0 z-10">
                    <div class="flex gap-1.5 items-center">
                        <div class="flex gap-1 mr-1">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                        </div>
                        <span class="text-[11px] font-bold text-slate-400 tracking-wide">Morning_Report.txt</span>
                    </div>
                    <button onclick="triggerUpdate()" class="text-[10px] bg-slate-700 text-white px-2 py-1 rounded shadow-sm hover:bg-slate-600 transition-colors">
                        초기화 <i class="fa-solid fa-rotate-right ml-0.5"></i>
                    </button>
                </div>
                <textarea id="memo-morning" oninput="autoResize(this)" class="w-full min-h-[300px] bg-transparent text-emerald-400 p-5 font-mono text-[12.5px] outline-none leading-relaxed"></textarea>
                
                <button onclick="copyMemo('memo-morning')" class="absolute bottom-5 right-5 bg-blue-600 hover:bg-blue-500 text-white shadow-[0_0_15px_rgba(37,99,235,0.5)] rounded-full px-5 py-3 flex items-center gap-2 text-xs font-extrabold active:scale-95 transition-all">
                    <i class="fa-solid fa-copy"></i> 복사하기
                </button>
            </div>
        </div>

        <div id="panel-dispatch" class="hidden space-y-5 animate-fade-in">
            
            <div class="bg-cardbg rounded-3xl p-5 border border-cardborder border-l-4 border-l-amber-500 shadow-md space-y-5">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 bg-amber-500/20 rounded-lg text-amber-400"><i class="fa-solid fa-bolt-lightning text-sm"></i></div>
                    <h3 class="text-sm font-bold text-white">급전 지시 설정</h3>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5 col-span-2">
                        <div class="flex justify-between items-center pr-1 mb-1">
                            <label class="block text-[11px] font-bold text-slate-400 pl-1">지시 시간 (24시간)</label>
                            <button onclick="setNow('d')" class="text-[10px] text-amber-400 font-bold flex items-center gap-1"><i class="fa-regular fa-clock"></i> 현재시간</button>
                        </div>
                        <input type="time" id="d-time" value="10:00" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-[15px] font-bold outline-none focus:border-amber-500 text-center shadow-sm">
                    </div>
                    
                    <div class="space-y-1.5 col-span-2">
                        <label class="block text-[11px] font-bold text-slate-400 pl-1">대상 호기</label>
                        <select id="d-target" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm font-bold outline-none focus:border-amber-500 shadow-sm appearance-none">
                            <option value="#1CC">#1CC</option>
                            <option value="#2CC">#2CC</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2 pt-2 border-t border-slate-700/50">
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5 pl-1">지시 문구 빠른 생성 (매크로)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="dMake('2+1 계통연결')" class="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-300 hover:text-amber-400 hover:border-amber-500/50 transition-colors">2+1 연결</button>
                        <button onclick="dMake('1+1 계통연결')" class="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-300 hover:text-amber-400 hover:border-amber-500/50 transition-colors">1+1 연결</button>
                        <button onclick="dMake('GT 추가 계통연결')" class="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-300 hover:text-amber-400 hover:border-amber-500/50 transition-colors col-span-2">GT 추가 계통연결</button>
                        <button onclick="dMake('계통분리')" class="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-300 hover:text-amber-400 hover:border-amber-500/50 transition-colors">전체 계통분리</button>
                        <button onclick="dMake('GT 1대 계통분리')" class="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-300 hover:text-amber-400 hover:border-amber-500/50 transition-colors">GT 1대 분리</button>
                    </div>
                </div>
            </div>

            <div class="bg-[#0f172a] rounded-3xl shadow-xl border border-slate-700 overflow-hidden relative mt-8">
                <div class="flex justify-between items-center px-4 py-3 bg-[#1e293b] border-b border-slate-700 sticky top-0 z-10">
                    <div class="flex gap-1.5 items-center">
                        <div class="flex gap-1.5 mr-2">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                        </div>
                        <span class="text-[11px] font-bold text-slate-400 tracking-wide">Dispatch_Memo.txt</span>
                    </div>
                </div>
                <textarea id="memo-dispatch" oninput="autoResize(this)" class="w-full min-h-[120px] bg-transparent text-amber-400 p-5 font-mono text-[13px] outline-none placeholder-slate-600 leading-relaxed"></textarea>
                
                <button onclick="copyMemo('memo-dispatch')" class="absolute bottom-5 right-5 bg-amber-600 hover:bg-amber-500 text-white shadow-[0_0_15px_rgba(217,119,6,0.5)] rounded-full px-5 py-3 flex items-center gap-2 text-xs font-extrabold active:scale-95 transition-all">
                    <i class="fa-solid fa-copy"></i> 복사하기
                </button>
            </div>
        </div>

        <div id="panel-grid" class="hidden space-y-5 animate-fade-in">
            
            <div class="bg-cardbg rounded-3xl p-5 border border-cardborder border-l-4 border-l-cyan-500 shadow-md space-y-5">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 bg-cyan-500/20 rounded-lg text-cyan-400"><i class="fa-solid fa-plug-circle-check text-sm"></i></div>
                    <h3 class="text-sm font-bold text-white">계통 조작 매크로</h3>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5 col-span-2">
                        <div class="flex justify-between items-center pr-1 mb-1">
                            <label class="block text-[11px] font-bold text-slate-400 pl-1">기준 시간 (24시간)</label>
                            <button onclick="setNow('g')" class="text-[10px] text-cyan-400 font-bold flex items-center gap-1"><i class="fa-regular fa-clock"></i> 현재시간</button>
                        </div>
                        <input type="time" id="g-time" value="18:30" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-[15px] font-bold outline-none focus:border-cyan-500 text-center shadow-sm">
                    </div>
                    <div class="space-y-1.5 col-span-2">
                        <label class="block text-[11px] font-bold text-slate-400 pl-1">대상 호기</label>
                        <select id="g-target" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm font-bold outline-none focus:border-cyan-500 shadow-sm appearance-none">
                            <option value="1">#1CC</option>
                            <option value="2">#2CC</option>
                        </select>
                    </div>
                </div>

                <div class="p-4 bg-slate-800 rounded-2xl border border-slate-700 shadow-inner">
                    <label class="block text-slate-300 text-[11px] font-extrabold mb-3 flex items-center gap-1.5"><i class="fa-solid fa-plus text-cyan-400"></i> 건바이건 연결 / AGC 추가</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="gAddConnect('GT1')" class="py-2.5 bg-slate-900 border border-slate-600 rounded-lg text-[10px] font-bold text-slate-300 shadow-sm active:bg-slate-700">GT1 연결</button>
                        <button onclick="gAddConnect('GT2')" class="py-2.5 bg-slate-900 border border-slate-600 rounded-lg text-[10px] font-bold text-slate-300 shadow-sm active:bg-slate-700">GT2 연결</button>
                        <button onclick="gAddConnect('ST')" class="py-2.5 bg-slate-900 border border-slate-600 rounded-lg text-[10px] font-bold text-slate-300 shadow-sm active:bg-slate-700">ST 연결</button>
                        <button onclick="gAddAgc('2+1')" class="py-2.5 bg-indigo-900/50 border border-indigo-500/50 rounded-lg text-[10px] font-bold text-indigo-300 shadow-sm active:bg-indigo-800 col-span-1">AGC (2+1)</button>
                        <button onclick="gAddAgc('1+1')" class="py-2.5 bg-indigo-900/50 border border-indigo-500/50 rounded-lg text-[10px] font-bold text-indigo-300 shadow-sm active:bg-indigo-800 col-span-2">AGC (1+1)</button>
                    </div>
                </div>

                <div class="p-4 bg-cyan-900/20 rounded-2xl border border-cyan-500/30 shadow-inner">
                    <label class="block text-cyan-400 text-[11px] font-extrabold mb-3 flex items-center gap-1.5"><i class="fa-solid fa-bolt text-cyan-400"></i> 시차 계통분리 자동 연산 (매크로)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="gAddSeparate('2+1')" class="py-3 bg-cyan-600 hover:bg-cyan-500 text-white border border-cyan-500 rounded-xl text-xs font-extrabold shadow-sm active:scale-95 flex flex-col items-center justify-center h-[70px]">
                            <span>2+1 분리 연산</span>
                            <span class="text-[9px] font-normal mt-1 opacity-80">-19분/-10분/-2분</span>
                        </button>
                        <button onclick="gAddSeparate('1+1')" class="py-3 bg-cyan-600 hover:bg-cyan-500 text-white border border-cyan-500 rounded-xl text-xs font-extrabold shadow-sm active:scale-95 flex flex-col items-center justify-center h-[70px] relative">
                            <span>1+1 분리 연산</span>
                            <span class="text-[9px] font-normal mt-1 opacity-80">-21분/-2분</span>
                            <select id="g-active-gt" class="absolute bottom-1 right-1 bg-cyan-800 text-[9px] text-cyan-100 rounded px-1 outline-none" onclick="event.stopPropagation()">
                                <option value="GT1">GT1</option><option value="GT2">GT2</option>
                            </select>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-[#0f172a] rounded-3xl shadow-xl border border-slate-700 overflow-hidden relative mt-8">
                <div class="flex justify-between items-center px-4 py-3 bg-[#1e293b] border-b border-slate-700 sticky top-0 z-10">
                    <div class="flex gap-1.5 items-center">
                        <div class="flex gap-1 mr-1">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                        </div>
                        <span class="text-[11px] font-bold text-slate-400 tracking-wide">Grid_Operation.txt</span>
                    </div>
                    <button onclick="document.getElementById('memo-grid').value=''" class="text-[10px] text-gray-400 bg-slate-700 px-2 py-1 rounded hover:text-white transition-colors">
                        비우기 <i class="fa-solid fa-trash ml-0.5"></i>
                    </button>
                </div>
                <textarea id="memo-grid" oninput="autoResize(this)" class="w-full min-h-[180px] bg-transparent text-cyan-400 p-5 font-mono text-[13px] outline-none placeholder-slate-600 leading-relaxed"></textarea>
                
                <button onclick="copyMemo('memo-grid')" class="absolute bottom-5 right-5 bg-cyan-600 hover:bg-cyan-500 text-white shadow-[0_0_15px_rgba(8,145,178,0.5)] rounded-full px-5 py-3 flex items-center gap-2 text-xs font-extrabold active:scale-95 transition-all">
                    <i class="fa-solid fa-copy"></i> 복사하기
                </button>
            </div>
        </div>

    </div>

    <script>
        let state1 = '운전';
        let state2 = '운전';

        window.onload = function() {
            // 오늘 날짜 바인딩
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('m-date').value = `${yyyy}-${mm}-${dd}`;

            // 초기 렌더링 상태 지정
            setCCState(1, '운전');
            setCCState(2, '운전');
            
            // 날씨 백그라운드 호출
            fetchWeather();

            // 모든 입력, 스크롤 요소에 즉각 반응형 리스너 장착 (0.1초 딜레이 방지)
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(el => {
                if(el.id !== 'memo-morning' && el.id !== 'memo-dispatch' && el.id !== 'memo-grid') {
                    el.addEventListener('input', triggerUpdate);
                    el.addEventListener('change', triggerUpdate);
                }
            });

            // 텍스트 초기 생성
            triggerUpdate();
            switchTab('morning');
        }

        // =====================================
        // 날씨 API (파주 문산) 자동 연동
        // =====================================
        async function fetchWeather() {
            const spinner = document.getElementById('weather-spinner');
            const tempLabel = document.getElementById('quick-weather-temp');
            const descLabel = document.getElementById('quick-weather-desc');
            const iconLabel = document.getElementById('weather-icon');
            
            spinner.classList.add('animate-spin');
            descLabel.innerText = '동기화 중...';

            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.8544&longitude=126.7881&current=temperature_2m,weather_code&timezone=Asia/Seoul');
                const data = await res.json();
                const temp = data.current.temperature_2m;
                const code = data.current.weather_code;

                let txt = '흐림'; let icon = '☁️';
                if(code === 0) { txt = '맑음'; icon = '☀️'; }
                else if(code <= 3 || code === 45 || code === 48) { txt = '흐림'; icon = '☁️'; }
                else if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) { txt = '비'; icon = '🌧️'; }
                else if([71,73,75,77,85,86].includes(code)) { txt = '눈'; icon = '❄️'; }

                document.getElementById('m-temp').value = temp.toFixed(1);
                document.getElementById('m-weather').value = txt;
                
                tempLabel.innerText = `${temp.toFixed(1)}°C`;
                descLabel.innerText = txt;
                iconLabel.innerText = icon;
                
                triggerUpdate();
            } catch(e) {
                descLabel.innerText = "날씨 오프라인";
            } finally {
                spinner.classList.remove('animate-spin');
            }
        }

        // =====================================
        // 탭 UI 컨트롤
        // =====================================
        function switchTab(t) {
            ['morning', 'dispatch', 'grid'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const pnl = document.getElementById(`panel-${tab}`);
                if(t === tab) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('tab-inactive');
                    pnl.classList.remove('hidden');
                } else {
                    btn.classList.add('tab-inactive');
                    btn.classList.remove('tab-active');
                    pnl.classList.add('hidden');
                }
            });
            // 탭 이동 시 텍스트 에디터 리사이징
            document.querySelectorAll('textarea').forEach(el => autoResize(el));
        }

        function triggerUpdate() {
            renderMorningMemo();
        }

        // =====================================
        // [탭 1] 아침현황 로직 (슬라이더 ↔ 인풋 실시간 동기화)
        // =====================================
        function syncFromSlider(id) {
            document.getElementById(`i-${id}`).value = document.getElementById(`s-${id}`).value;
            triggerUpdate();
        }
        function syncFromInput(id) {
            let v = parseInt(document.getElementById(`i-${id}`).value) || 0;
            v = Math.max(0, Math.min(350, v));
            document.getElementById(`s-${id}`).value = v;
            triggerUpdate();
        }
        
        function setCCState(cc, state) {
            if(cc===1) state1 = state;
            else state2 = state;

            const btns = ['정지','운전','운전11','기동','계획정비'];
            const color = cc === 1 ? 'blue' : 'teal';
            const colorDark = cc === 1 ? 'indigo' : 'teal';

            btns.forEach(b => {
                const el = document.getElementById(`btn-${cc}cc-${b}`);
                if(b === state) {
                    el.className = `py-2.5 rounded-xl border border-${colorDark}-500 bg-${colorDark}-600/20 text-[11px] font-bold text-${colorDark}-400`;
                } else {
                    el.className = `py-2.5 rounded-xl border border-slate-700 bg-slate-800 text-[11px] font-bold text-slate-400`;
                }
            });

            // 뱃지 업데이트
            const badge = document.getElementById(`badge-${cc}cc`);
            let bText = state + ' 상태';
            if(state === '운전') bText = '2+1 운전중';
            else if(state === '운전11') bText = '1+1 운전중';
            else if(state === '계획정비') bText = '계획정비 중';
            badge.innerText = bText;

            // 정비 및 비활성화 락
            const ids = cc === 1 ? ['gt11','gt12','st10'] : ['gt21','gt22','st20'];
            const isOff = (state === '정지' || state === '계획정비');
            
            ids.forEach(id => {
                const s = document.getElementById(`s-${id}`);
                const i = document.getElementById(`i-${id}`);
                if(isOff) {
                    s.value = 0; i.value = 0;
                    s.disabled = true; i.disabled = true;
                    i.classList.add('opacity-50');
                } else {
                    s.disabled = false; i.disabled = false;
                    i.classList.remove('opacity-50');
                }
            });

            document.getElementById(`m-box-${cc}`).style.display = state === '계획정비' ? 'block' : 'none';
            triggerUpdate();
        }

        // 출력값 정렬기 (요청받은 양식 띄어쓰기 100% 동일하게 하드코딩)
        function padMW1(g1, g2, s) {
            // #1CC는 8칸 띄어쓰기 적용
            return `        ${g1.toString().padStart(3,' ')}/ ${g2.toString().padStart(3,' ')}/ ${s.toString().padStart(3,' ')}MW    `;
        }
        function padMW2(g1, g2, s) {
            // #2CC는 9칸 띄어쓰기 적용
            return `         ${g1.toString().padStart(3,' ')}/ ${g2.toString().padStart(3,' ')}/ ${s.toString().padStart(3,' ')}MW      `;
        }

        function getCCBlock(cc, scheduleArr) {
            const st = cc===1 ? state1 : state2;
            const prefix = cc===1 ? '#1CC' : '#2CC';
            const gtNm = cc===1 ? '11GT/12GT/10ST' : '21GT/22GT/20ST';
            const g1 = parseInt(document.getElementById(cc===1?'i-gt11':'i-gt21').value)||0;
            const g2 = parseInt(document.getElementById(cc===1?'i-gt12':'i-gt22').value)||0;
            const s = parseInt(document.getElementById(cc===1?'i-st10':'i-st20').value)||0;
            const tot = g1+g2+s;
            const padFunc = cc===1 ? padMW1 : padMW2;

            if(st==='정지') return `    - ${prefix} 급전지시 정지 상태\n     (Total Load : 0MW)        \n     ${gtNm} \n             0/   0/  0MW`;
            if(st==='운전') return `    - ${prefix} 2+1 운전 중\n     (Total Load : ${tot}MW)        \n     ${gtNm} \n${padFunc(g1,g2,s)}`;
            if(st==='운전11') return `    - ${prefix} 1+1 운전 중\n     (Total Load : ${tot}MW)        \n     ${gtNm} \n${padFunc(g1,g2,s)}`;
            if(st==='기동') return `    - ${prefix} 기동 중\n     (Total Load : ${tot}MW)        \n     ${gtNm} \n${padFunc(g1,g2,s)}`;
            if(st==='계획정비') {
                const per = document.getElementById(cc===1?'period-1':'period-2').value;
                scheduleArr.push(`-${prefix} 계획정비\n      (${per})`);
                return `    - ${prefix} 계획정비 정지 상태\n     (Total Load : 0MW)        \n     ${gtNm} \n           0/ 0/ 0MW`;
            }
        }

        function renderMorningMemo() {
            const d = document.getElementById('m-date').value;
            if(!d) return;
            const days = ['일','월','화','수','목','금','토'];
            const dateObj = new Date(d);
            const dateHeader = `${dateObj.getMonth()+1}월 ${dateObj.getDate()}일(${days[dateObj.getDay()]})`;

            const t = document.getElementById('m-temp').value;
            const w = document.getElementById('m-weather').value;
            
            let sch = [];
            const blk1 = getCCBlock(1, sch);
            const blk2 = getCCBlock(2, sch);
            
            const issue = document.getElementById('m-issue').value;
            let issueStr = "";
            if(sch.length > 0) {
                issueStr = "     " + sch.join('\n     ');
                if(issue && issue !== '없음') issueStr += `\n     -${issue}`;
            } else {
                issueStr = `     -${issue}`;
            }

            const text = `${dateHeader} 7:00 운전현황\n\n■ 급전지시\n    - 없음\n■ 대기온도 : ${t}°C (${w})\n■ 운전현황\n${blk1}\n${blk2}\n■ 특이사항\n${issueStr}`;
            const memoEl = document.getElementById('memo-morning');
            memoEl.value = text;
            autoResize(memoEl);
        }

        // =====================================
        // [탭 2] 급전 지시 로직
        // =====================================
        function setNow(prefix) {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById(`${prefix}-time`).value = `${h}:${m}`;
            showToast(`현재 시간 입력 완료`);
        }

        function dMake(type) {
            const time = document.getElementById('d-time').value; // HH:MM 
            if(!time) { showToast('지시 시간을 입력해주세요.','error'); return; }
            const target = document.getElementById('d-target').value;
            
            let line = "";
            if(type === 'GT 추가 계통연결') line = `${time}  ${target} ${type}`; // 띄어쓰기 2칸 특수 조건
            else line = `${time} ${target} ${type}`;

            const text = `급전지시입니다.\n${line}`;
            const memo = document.getElementById('memo-dispatch');
            memo.value = text;
            autoResize(memo);
        }

        // =====================================
        // [탭 3] 계통 연결/분리 로직
        // =====================================
        function appendGridMemo(str) {
            const memo = document.getElementById('memo-grid');
            if(memo.value) memo.value += "\n" + str;
            else memo.value = str;
            autoResize(memo);
        }

        function getGTargetName(type) {
            const block = document.getElementById('g-target').value; // 1 or 2
            if(type === 'GT1') return block === '1' ? '11GT' : '21GT';
            if(type === 'GT2') return block === '1' ? '12GT' : '22GT';
            if(type === 'ST')  return block === '1' ? '10ST' : '20ST';
        }

        function gAddConnect(type) {
            const time = document.getElementById('g-time').value; // HH:MM
            if(!time) { showToast('시간을 입력해주세요.','error'); return; }
            const name = getGTargetName(type);
            appendGridMemo(`${time} #${name} 계통연결`);
        }

        function gAddSeparateSingle(type) {
            const time = document.getElementById('g-time').value;
            if(!time) { showToast('시간을 입력해주세요.','error'); return; }
            const name = getGTargetName(type);
            appendGridMemo(`${time} #${name} 계통분리`);
        }

        function gAddAgc(mode) {
            const time = document.getElementById('g-time').value;
            if(!time) { showToast('시간을 입력해주세요.','error'); return; }
            const block = document.getElementById('g-target').value === '1' ? '#1CC' : '#2CC';
            appendGridMemo(`${time} ${block} AGC On (${mode})`);
        }

        // 시차 역산 로직
        function subMins(timeStr, mins) {
            if(!timeStr) return "00:00";
            const [h, m] = timeStr.split(':').map(Number);
            let d = new Date();
            d.setHours(h, m - mins, 0);
            return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function gAddSeparate(mode) {
            const time = document.getElementById('g-time').value; // Base Time
            if(!time) { showToast('기준 시간을 설정해주세요.','error'); return; }
            
            const stName = getGTargetName('ST');
            const gt1Name = getGTargetName('GT1');
            const gt2Name = getGTargetName('GT2');

            let lines = [];
            if(mode === '2+1') {
                lines.push(`${subMins(time, 19)} #${stName} 계통분리`);
                lines.push(`${subMins(time, 10)} #${gt1Name} 계통분리`);
                lines.push(`${subMins(time, 2)} #${gt2Name} 계통분리`);
            } else if (mode === '1+1') {
                const act = document.getElementById('g-active-gt').value;
                const activeName = getGTargetName(act);
                lines.push(`${subMins(time, 21)} #${stName} 계통분리`);
                lines.push(`${subMins(time, 2)} #${activeName} 계통분리`);
            }

            appendGridMemo(lines.join('\n'));
            showToast(`${mode} 자동 시차계산 완료`);
        }

        // =====================================
        // 공통 유틸 
        // =====================================
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight + 20) + 'px';
        }

        function copyMemo(id) {
            const text = document.getElementById(id).value;
            if(!text) { showToast("복사할 내용이 없습니다.", "error"); return; }

            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed"; 
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.select();

            try {
                document.execCommand('copy');
                showToast("📋 완벽하게 복사되었습니다!");
            } catch(e) {
                showToast("복사 실패. 메모장을 길게 눌러 복사하세요.", "error");
            }
            document.body.removeChild(ta);
        }

        function showToast(msg, type = "success") {
            const box = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `flex items-center justify-center gap-2 px-4 py-3.5 rounded-full text-xs font-bold shadow-xl transition-all duration-300 translate-y-4 opacity-0 text-white ${
                type==='success' ? 'bg-blue-600 shadow-blue-500/40' : 'bg-red-500 shadow-red-500/40'
            }`;
            el.innerHTML = msg;
            box.appendChild(el);
            setTimeout(() => el.classList.remove('translate-y-4', 'opacity-0'), 10);
            setTimeout(() => {
                el.classList.add('opacity-0', 'scale-90');
                setTimeout(()=>el.remove(), 300);
            }, 2000);
        }
    </script>
</body>
</html>
